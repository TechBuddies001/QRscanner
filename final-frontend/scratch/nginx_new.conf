server {
    listen 80;
    server_name 187.127.152.104 tarkshyasolution.in www.tarkshyasolution.in;

    # Increase upload size for QR/image uploads
    client_max_body_size 20M;

    # Website (scanner-web) Static Files
    root /var/www/scanner-web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin Panel (Next.js on port 3000)
    location /admin {
        proxy_pass http://localhost:3000/admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js Internal Assets
    location /_next {
        proxy_pass http://localhost:3000/_next;
        proxy_set_header Host $host;
    }

    # Compatibility for old tag links
    location /tag {
        proxy_pass http://localhost:3000/tag;
        proxy_set_header Host $host;
    }

    # Backend API (Express on port 5001)
    location /api/ {
        proxy_pass http://localhost:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/final-backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }
}
